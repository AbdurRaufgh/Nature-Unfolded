<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioFold | Sustainable Materials</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="scene-container"></canvas>
    <div class="noise-overlay"></div> <!-- Fixed grain overlay -->

    <main>
        <nav>
            <div class="logo">BIOFOLD</div>
            <div class="menu">Products</div>
        </nav>

        <section class="hero">
            <h1>Nature, <br><span class="outline">Unfolded.</span></h1>
            <p>Premium beeswax wraps & organic packaging solutions.</p>
            <button class="cta">Explore Materials</button>
        </section>

        <section class="details">
            <div class="content-box">
                <h2>Zero Waste.</h2>
                <p>Our BioFold wraps use 100% organic cotton infused with sustainably harvested beeswax.</p>
            </div>
        </section>

        <footer>
            <div class="footer-line"></div>
            <div class="footer-content">
                <span>© 2026 BIOFOLD LABS</span>
                <span>BASED IN EARTH</span>
                <span>INSTAGRAM / TWITTER</span>
            </div>
        </footer>
    </main>

    <!-- CRITICAL: Load libraries before app.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
